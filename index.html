<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vogyfry Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #f5f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px 20px; }
        h1 { font-size: 2rem; font-weight: 600; margin-bottom: 32px; }
        .apps { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
        .app-link { display: flex; flex-direction: column; align-items: center; gap: 12px; text-decoration: none; color: #f5f5f7; padding: 24px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; width: 160px; }
        .app-link:hover { background: rgba(255,255,255,0.1); transform: translateY(-4px); }
        .app-link img { width: 80px; height: 80px; border-radius: 18px; }
        .app-link span { font-size: 1.1rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Our Apps</h1>
        <div class="apps">
            <a href="mavee/" class="app-link">
                <img src="mavee/icon.png" alt="Mavee">
                <span>Mavee</span>
            </a>
        </div>
    </div>
</body>
</html>
